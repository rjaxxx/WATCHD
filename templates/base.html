<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Watchd{% endblock %}</title>
    <link rel="icon" href="{{ url_for('static', filename='favicon.png') }}" type="image/png">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>
    <nav>
        <a href="{{ url_for('index') }}" class="nav-brand">
            <img src="{{ url_for('static', filename='favicon.png') }}" alt="Watchd logo" class="nav-logo">
            Watchd
        </a>

        <div class="nav-centre">
    {% if current_user.is_authenticated %}
        <a href="{{ url_for('index') }}" class="nav-icon" title="Home" aria-label="Home">
            <i class="fa-solid fa-house" aria-hidden="true"></i>
        </a>
        <div class="nav-search">
            <button class="nav-icon nav-search-toggle" id="searchToggle" 
                    title="Quick search" aria-label="Quick search" type="button">
                <i class="fa-solid fa-magnifying-glass" aria-hidden="true"></i>
            </button>
            <div class="nav-search-dropdown" id="searchDropdown">
                <form method="GET" action="{{ url_for('search') }}">
                    <input 
                        type="text" 
                        name="q" 
                        class="nav-search-input" 
                        placeholder="Search movies or TV..."
                        id="navSearchInput"
                        autocomplete="off"
                    >
                    <select name="type" class="nav-search-select">
                        <option value="movie">Movies</option>
                        <option value="tv">TV</option>
                    </select>
                    <button type="submit" class="nav-search-btn" aria-label="Search">
                        <i class="fa-solid fa-arrow-right" aria-hidden="true"></i>
                    </button>
                </form>
            </div>
        </div>
        <a href="{{ url_for('watchlist') }}" class="nav-icon" title="Watchlist" aria-label="Watchlist">
            <i class="fa-solid fa-bookmark" aria-hidden="true"></i>
        </a>

    {% endif %}
</div>

        <div class="nav-links">
            {% if current_user.is_authenticated %}
                <span>{{ current_user.username }}</span>
                <a href="{{ url_for('index') }}" class="nav-icon" title="Profile" aria-label="Profile">
                    <i class="fa-solid fa-user" aria-hidden="true"></i>
                </a>
                <a href="{{ url_for('logout') }}" class="nav-icon" title="Log out" aria-label="Log out">
                    <i class="fa-solid fa-right-from-bracket" aria-hidden="true"></i>
                </a>
            {% else %}
                <a href="{{ url_for('login') }}">Log in</a>
                <a href="{{ url_for('register') }}">Register</a>
            {% endif %}
        </div>
    </nav>
    <main>
        {% block content %}{% endblock %}
    </main>
    <script>
    const toggle   = document.getElementById('searchToggle');
    const dropdown = document.getElementById('searchDropdown');
    const input    = document.getElementById('navSearchInput');

    // open/close when clicking the magnifying glass
    toggle.addEventListener('click', () => {
        dropdown.classList.toggle('open');
        if (dropdown.classList.contains('open')) {
            input.focus();
        }
    });

    // close when clicking anywhere else on the page
    document.addEventListener('click', (e) => {
        if (!toggle.contains(e.target) && !dropdown.contains(e.target)) {
            dropdown.classList.remove('open');
        }
    });

    // close when pressing Escape
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
            dropdown.classList.remove('open');
        }
    });
</script>
</body>
